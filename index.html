<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>機器人數學突擊隊 - 終極修正版</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial Black', 'Microsoft JhengHei', sans-serif; background-color: #000; touch-action: none; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; padding: 20px; box-sizing: border-box;
            color: #fff; text-shadow: 0 0 10px rgba(0,0,0,1); user-select: none;
        }

        .hud-header { display: flex; justify-content: space-between; align-items: center; }
        .hud-card {
            background: rgba(15, 30, 60, 0.85);
            border: 2px solid #00f2ff;
            padding: 12px 25px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        .stat-label { font-size: 11px; color: #00f2ff; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 28px; font-weight: 900; }
        #score-val { color: #ffff00; }
        #health-val { color: #ff3e3e; }

        /* 虛擬搖桿 (手機專用) */
        #joystick-wrapper {
            position: absolute; bottom: 50px; left: 50px;
            width: 140px; height: 140px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%; border: 3px solid rgba(0, 242, 255, 0.4);
            pointer-events: auto; display: none;
        }
        #joystick-stick {
            position: absolute; top: 50%; left: 50%;
            width: 60px; height: 60px;
            background: radial-gradient(circle, #00f2ff 0%, #0077ff 100%);
            border-radius: 50%; transform: translate(-50%, -50%);
        }

        /* 準心 (PC 專用) */
        .crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 30px; height: 30px;
            transform: translate(-50%, -50%);
            pointer-events: none; display: none;
        }
        .crosshair::before { content: ''; position: absolute; top: 14px; left: 0; width: 30px; height: 2px; background: #00ff00; }
        .crosshair::after { content: ''; position: absolute; top: 0; left: 14px; width: 2px; height: 30px; background: #00ff00; }

        /* 遮罩層 */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #0d1b2a 0%, #000 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; pointer-events: auto;
        }

        .modal {
            background: rgba(20, 30, 60, 0.95);
            border: 4px solid #00f2ff;
            padding: 40px; border-radius: 30px;
            text-align: center; max-width: 500px; width: 85%;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.4);
        }

        h1 { color: #00f2ff; font-size: 32px; margin-bottom: 10px; }
        .modal p { color: #ccd6f6; font-size: 16px; line-height: 1.5; margin-bottom: 30px; }

        .mode-selection { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        
        .mode-btn {
            background: #1a2a4a; border: 2px solid #00f2ff;
            color: #fff; padding: 20px; border-radius: 15px;
            cursor: pointer; transition: all 0.2s; width: 140px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .mode-btn:hover { background: #00f2ff; color: #000; transform: scale(1.05); }

        #msg-flash {
            position: absolute; top: 35%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 45px; font-weight: 900;
            pointer-events: none; opacity: 0;
            z-index: 500;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="hud-header">
            <div class="hud-card">
                <div class="stat-label">ENERGY 能量</div>
                <div id="health-val" class="stat-value">100%</div>
            </div>
            <div class="hud-card">
                <div class="stat-label">SCORE 積分</div>
                <div id="score-val" class="stat-value">0 / 100</div>
            </div>
        </div>

        <div id="msg-flash"></div>
        <div class="crosshair" id="main-crosshair"></div>
        <div id="joystick-wrapper"><div id="joystick-stick"></div></div>
    </div>

    <!-- 啟動選擇 -->
    <div id="start-screen" class="overlay">
        <div class="modal">
            <h1>機器人數學突擊隊</h1>
            <p>
                <b>規則：</b>答對 +10 | 答錯 -10<br>
                <b>獲勝條件：</b>100 分<br>
                <b>傷害：</b>碰撞扣 5 點<br><br>
                請選擇遊玩裝置：
            </p>
            <div class="mode-selection">
                <div class="mode-btn" onclick="startGame('pc')">
                    <span style="font-size: 30px;">💻</span>
                    <b>電腦模式</b>
                    <small>W 前進 / S 後退</small>
                </div>
                <div class="mode-btn" onclick="startGame('mobile')">
                    <span style="font-size: 30px;">📱</span>
                    <b>手機模式</b>
                    <small>搖桿 + 觸控</small>
                </div>
            </div>
        </div>
    </div>

    <!-- 結束畫面 -->
    <div id="end-screen" class="overlay" style="display:none;">
        <div class="modal">
            <h1 id="end-title">系統狀態</h1>
            <p id="end-msg"></p>
            <button style="background:linear-gradient(to bottom, #00f2ff, #0077ff); border:none; padding:15px 40px; font-weight:bold; color:#000; border-radius:30px; cursor:pointer;" onclick="location.reload()">重新啟動</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const AudioEngine = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(type) {
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);
                const now = this.ctx.currentTime;
                if(type === 'shoot') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(600, now);
                    osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
                    gain.gain.setValueAtTime(0.04, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                } else if(type === 'hit') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
                    osc.frequency.linearRampToValueAtTime(1200, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                } else if(type === 'miss') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now);
                    osc.frequency.linearRampToValueAtTime(50, now + 0.3);
                    gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                } else if(type === 'damage') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(80, now);
                    gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                }
            }
        };

        let scene, camera, renderer, clock;
        let isRunning = false, controlType = 'pc';
        let score = 0, health = 100, robots = [], spawnTimer = 0;
        let damageCooldown = 0;
        const ARENA_SIZE = 40;

        // 控制變數
        let moveF = false, moveB = false, moveL = false, moveR = false;
        let velocity = new THREE.Vector3();
        let joystickActive = false, joystickData = { x: 0, y: 0 };
        let touchRotate = { active: false, lastX: 0, lastY: 0 };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a1122);
            scene.fog = new THREE.Fog(0x0a1122, 5, 45);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 12);

            // 極亮光照
            scene.add(new THREE.AmbientLight(0xffffff, 1.3));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(20, 40, 20);
            scene.add(sun);

            // 地板與網格
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(ARENA_SIZE, ARENA_SIZE), new THREE.MeshStandardMaterial({ color: 0x243447 }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);
            scene.add(new THREE.GridHelper(ARENA_SIZE, 20, 0x00f2ff, 0x111122));

            // 邊界
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x111122 });
            const wallH = 4;
            const walls = [
                {p: [0, wallH/2, -ARENA_SIZE/2], s: [ARENA_SIZE, wallH, 1]},
                {p: [0, wallH/2, ARENA_SIZE/2], s: [ARENA_SIZE, wallH, 1]},
                {p: [-ARENA_SIZE/2, wallH/2, 0], s: [1, wallH, ARENA_SIZE]},
                {p: [ARENA_SIZE/2, wallH/2, 0], s: [1, wallH, ARENA_SIZE]}
            ];
            walls.forEach(w => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(...w.s), wallMat);
                m.position.set(...w.p);
                scene.add(m);
            });

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            window.addEventListener('resize', onResize);
            setupInput();
        }

        function setupInput() {
            // 鍵盤監聽
            document.addEventListener('keydown', (e) => {
                if(e.code === 'KeyW') moveF = true;
                if(e.code === 'KeyS') moveB = true;
                if(e.code === 'KeyA') moveL = true;
                if(e.code === 'KeyD') moveR = true;
            });
            document.addEventListener('keyup', (e) => {
                if(e.code === 'KeyW') moveF = false;
                if(e.code === 'KeyS') moveB = false;
                if(e.code === 'KeyA') moveL = false;
                if(e.code === 'KeyD') moveR = false;
            });

            // PC 滑鼠轉向與射擊
            document.addEventListener('mousemove', (e) => {
                if (isRunning && controlType === 'pc' && document.pointerLockElement === document.body) {
                    camera.rotation.y -= e.movementX * 0.002;
                    camera.rotation.x -= e.movementY * 0.002;
                    camera.rotation.x = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, camera.rotation.x));
                    camera.rotation.order = 'YXZ';
                }
            });

            document.addEventListener('mousedown', () => {
                if(isRunning && controlType === 'pc' && document.pointerLockElement === document.body) {
                    AudioEngine.play('shoot');
                    shoot(new THREE.Vector2(0, 0));
                }
            });

            // 手機搖桿與觸控
            const joy = document.getElementById('joystick-wrapper');
            const stick = document.getElementById('joystick-stick');
            joy.addEventListener('touchstart', (e) => { e.preventDefault(); joystickActive = true; });
            joy.addEventListener('touchmove', (e) => {
                if(!joystickActive) return;
                const rect = joy.getBoundingClientRect();
                const touch = e.touches[0];
                let dx = touch.clientX - (rect.left + rect.width/2);
                let dy = touch.clientY - (rect.top + rect.height/2);
                const dist = Math.sqrt(dx*dx + dy*dy);
                const max = rect.width/2;
                if(dist > max) { dx *= max/dist; dy *= max/dist; }
                stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                joystickData.x = dx / max; joystickData.y = dy / max;
            });
            joy.addEventListener('touchend', () => { joystickActive = false; joystickData = {x:0, y:0}; stick.style.transform = `translate(-50%, -50%)`; });

            document.addEventListener('touchstart', (e) => {
                if(!isRunning || controlType !== 'mobile') return;
                const touch = e.touches[0];
                if(e.target.closest('#joystick-wrapper') || e.target.closest('.hud-card')) return;
                touchRotate.active = true;
                touchRotate.lastX = touch.clientX; touchRotate.lastY = touch.clientY;
                const coords = new THREE.Vector2((touch.clientX/window.innerWidth)*2-1, -(touch.clientY/window.innerHeight)*2+1);
                AudioEngine.play('shoot');
                shoot(coords);
            }, {passive: false});

            document.addEventListener('touchmove', (e) => {
                if(!touchRotate.active) return;
                const touch = e.touches[0];
                const dx = touch.clientX - touchRotate.lastX;
                const dy = touch.clientY - touchRotate.lastY;
                camera.rotation.y -= dx * 0.006; camera.rotation.x -= dy * 0.005;
                camera.rotation.x = Math.max(-Math.PI/3, Math.min(Math.PI/3, camera.rotation.x));
                touchRotate.lastX = touch.clientX; touchRotate.lastY = touch.clientY;
            }, {passive: false});

            document.addEventListener('touchend', () => touchRotate.active = false);
        }

        function startGame(type) {
            controlType = type;
            AudioEngine.init();
            document.getElementById('start-screen').style.display = 'none';
            isRunning = true;
            if(type === 'pc') {
                document.body.requestPointerLock();
                document.getElementById('main-crosshair').style.display = 'block';
            } else {
                document.getElementById('joystick-wrapper').style.display = 'block';
                if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
            }
        }

        function createTexture(text, color = '#fff', isQ = false) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = isQ ? '#000' : '#222'; ctx.fillRect(0, 0, 512, 256);
            ctx.strokeStyle = color; ctx.lineWidth = 20; ctx.strokeRect(10, 10, 492, 236);
            ctx.fillStyle = color;
            ctx.font = `bold ${isQ?100:180}px "Arial Black", sans-serif`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(text, 256, 128);
            return new THREE.CanvasTexture(canvas);
        }

        function spawnRobot() {
            const a = Math.floor(Math.random() * 9) + 1;
            const b = Math.floor(Math.random() * 9) + 1;
            const op = Math.random() > 0.5 ? '+' : '-';
            const ans = op === '+' ? a + b : Math.max(1, a + b - b);
            const realA = op === '+' ? a : (ans + b);
            const options = [ans, ans + 2, ans - 3].sort(() => Math.random() - 0.5);

            const g = new THREE.Group();
            g.userData = { correct: ans, phase: Math.random()*Math.PI, speed: 1.0 + (score/100)*1.5 };
            const metal = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.8 });
            
            // 身體
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, 0.6), metal);
            body.position.y = 1.2; g.add(body);
            // 頭
            const head = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.5, 12), metal);
            head.position.y = 2.1; g.add(head);
            // 題目
            const sign = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 0.7), new THREE.MeshBasicMaterial({ map: createTexture(`${realA}${op}${b}=?`, '#ffff00', true), side: 2 }));
            sign.position.y = 3.0; g.add(sign);
            // 腳
            const lLeg = new THREE.Group(); lLeg.position.set(-0.3, 0.6, 0);
            const rLeg = new THREE.Group(); rLeg.position.set(0.3, 0.6, 0);
            const lm = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.7, 0.28), metal);
            lm.position.y = -0.35; lLeg.add(lm.clone()); rLeg.add(lm);
            g.add(lLeg, rLeg); g.userData.lLeg = lLeg; g.userData.rLeg = rLeg;

            // 答案按鈕
            const bp = [{p:[0,1.2,0.31],s:[0.7,0.5,0.1]}, {p:[-0.3,0.3,0.15],s:[0.45,0.45,0.1]}, {p:[0.3,0.3,0.15],s:[0.45,0.45,0.1]}];
            options.forEach((v, i) => {
                const b = new THREE.Mesh(new THREE.BoxGeometry(...bp[i].s), new THREE.MeshStandardMaterial({ map: createTexture(v.toString(), '#00ff00') }));
                b.position.set(...bp[i].p); b.userData = { val: v }; g.add(b);
            });

            const angle = Math.random()*Math.PI*2, d = ARENA_SIZE*0.45;
            g.position.set(Math.cos(angle)*d, 0, Math.sin(angle)*d);
            scene.add(g); robots.push(g);
        }

        function shoot(coords) {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(coords, camera);
            const hits = ray.intersectObjects(robots, true);
            if(hits.length > 0) {
                const obj = hits[0].object;
                if(obj.userData.val !== undefined) {
                    const r = obj.parent;
                    if(obj.userData.val === r.userData.correct) {
                        score += 10; AudioEngine.play('hit'); flashMsg("正確答案！+10", "#00ff00");
                        scene.remove(r); robots = robots.filter(x => x !== r);
                    } else {
                        score = Math.max(0, score - 10); AudioEngine.play('miss'); flashMsg("錯誤！-10", "#ff3333");
                    }
                    document.getElementById('score-val').innerText = `${score} / 100`;
                    if(score >= 100) end(true);
                }
            }
        }

        function flashMsg(t, c) {
            const m = document.getElementById('msg-flash');
            m.innerText = t; m.style.color = c; m.style.opacity = 1;
            m.style.transform = 'translate(-50%, -120%) scale(1.1)';
            setTimeout(() => { m.style.opacity = 0; m.style.transform = 'translate(-50%, -50%)'; }, 700);
        }

        function end(win) {
            isRunning = false; if(document.pointerLockElement) document.exitPointerLock();
            document.getElementById('end-screen').style.display = 'flex';
            document.getElementById('end-title').innerText = win ? "任務達成" : "能源歸零";
            document.getElementById('end-msg').innerText = win ? "恭喜你成為數學特攻隊之王！" : "機器人入侵了！再挑戰一次吧！";
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta(), t = clock.getElapsedTime();
            if(isRunning) {
                // 核心移動邏輯修正
                velocity.x -= velocity.x * 10 * dt;
                velocity.z -= velocity.z * 10 * dt;
                
                let mz = 0, mx = 0;
                if(controlType === 'pc') {
                    mz = Number(moveF) - Number(moveB); // W為1, S為-1
                    mx = Number(moveR) - Number(moveL);
                } else if(joystickActive) {
                    mx = joystickData.x; mz = -joystickData.y;
                }

                // translateZ(-val) 為前進, translateZ(val) 為後退
                // 當 mz = 1 (W) 時，我們要前進，所以傳入負值
                if(mz !== 0) camera.translateZ(-mz * 15 * dt);
                if(mx !== 0) camera.translateX(mx * 15 * dt);
                
                // 限制高度與場地
                camera.position.y = 1.6;
                const lim = ARENA_SIZE/2 - 1.2;
                camera.position.x = Math.max(-lim, Math.min(lim, camera.position.x));
                camera.position.z = Math.max(-lim, Math.min(lim, camera.position.z));

                if(damageCooldown > 0) damageCooldown -= dt;
                spawnTimer += dt; if(spawnTimer > 3.0 && robots.length < 5) { spawnRobot(); spawnTimer = 0; }

                robots.forEach(r => {
                    const toP = new THREE.Vector3().subVectors(camera.position, r.position).normalize(); toP.y = 0;
                    r.position.add(toP.multiplyScalar(r.userData.speed * dt));
                    r.lookAt(camera.position.x, 0, camera.position.z);
                    r.userData.lLeg.rotation.x = Math.sin(t*9+r.userData.phase)*0.5;
                    r.userData.rLeg.rotation.x = -Math.sin(t*8+r.userData.phase)*0.5;
                    
                    // 碰撞扣血 (一次 5 點)
                    if(r.position.distanceTo(camera.position) < 1.8 && damageCooldown <= 0) {
                        health -= 5; damageCooldown = 1.2;
                        AudioEngine.play('damage');
                        document.getElementById('health-val').innerText = `${Math.max(0, health)}%`;
                        flashMsg("警告！扣除 5 點能量", "#ff0000");
                        if(health <= 0) end(false);
                    }
                });
            }
            renderer.render(scene, camera);
        }
        init(); animate();
    </script>
</body>
</html>
